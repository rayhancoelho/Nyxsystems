mk("07:00","B2","Leitura ou caminhada leve - descanso ativo","Foto + texto","Ar livre ou ambiente calmo","Livro aberto, paisagem","Texto: 'Domingo. Sem treino pesado. Leitura e caminhada. Descanso ativo. O corpo descansa em movimento.'"),
mk("07:30","B2","Caminhada leve de domingo","Video sem fala + texto","Ar livre, rua calma","Rua calma, paisagem tranquila","Filmar a caminhada. Texto: 'Caminhada leve. Movimento sem cobranca. O corpo nao fica parado.'"),
mk("09:30","B4","Caixinha - pesquisa de conteudo pra semana","Foto + sticker caixinha","Com caderno de planejamento, cafe","Caderno, cafe","Sticker caixinha: 'Qual tema voces querem que eu aprofunde essa semana?' ou 'Sobre o que voces tem mais duvida: sono, estresse ou produtividade?'")
];

var DEFAULT_DATA={};
DAYS.forEach(function(day,idx){
var m=MANHA[day]||[];
var isFds=(day==="Sabado"||day==="Domingo");
var t=isFds?TARDE_FDSEMANA:TARDE_SEMANA;
var copies=[];
for(var i=0;i<t.length;i++){copies.push(mk(t[i].t,t[i].b,t[i].d,t[i].fo,t[i].ce,t[i].el,t[i].fa))}
DEFAULT_DATA[day]=m.concat(copies);
});

var ANGLES={"Segunda":"Peso + contraste com sono","Terca":"Consistencia silenciosa","Quarta":"Metade da semana - Acumulado","Quinta":"DIA DO PROTOCOLO COMPLETO","Sexta":"O protocolo nao tira folga","Sabado":"Mesmo horario no fim de semana","Domingo":"Sono de hoje define a segunda"};

var data=JSON.parse(JSON.stringify(DEFAULT_DATA));
var st={day:0,view:"daily",done:{}};

try{
var dow=new Date().getDay();
st.day=dow===0?6:dow-1;
}catch(x){st.day=0}

try{
var sv=localStorage.getItem('rs3');
if(sv){data=JSON.parse(sv)}
}catch(x){data=JSON.parse(JSON.stringify(DEFAULT_DATA))}

try{
var sd=localStorage.getItem('rs3d');
if(sd){st.done=JSON.parse(sd)}
}catch(x){st.done={}}

function save(){
try{localStorage.setItem('rs3',JSON.stringify(data));localStorage.setItem('rs3d',JSON.stringify(st.done))}catch(x){}
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'--'}

function R(){
try{
var a=document.getElementById('app');
var h='';
h+='<div style="padding:14px 10px 4px;display:flex;align-items:center;gap:8px">';
h+='<div style="width:28px;height:28px;background:#e94560;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;font-family:monospace">R</div>';
h+='<div><div style="font-size:14px;font-family:monospace;font-weight:800;color:#fff">Rayhan Stories</div>';
h+='<div style="color:#2a2a2a;font-size:8px;font-family:monospace;letter-spacing:2px">CONTROLE DE STORIES</div></div></div>';

h+='<div style="display:flex;gap:4px;padding:6px 10px;position:sticky;top:0;background:#050508;z-index:50">';
h+='<button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:'+(st.view==='daily'?'#e94560':'#0c0c18')+';color:'+(st.view==='daily'?'#fff':'#555')+'" onclick="SV(\'daily\')">Dia</button>';
h+='<button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:'+(st.view==='blocks'?'#e94560':'#0c0c18')+';color:'+(st.view==='blocks'?'#fff':'#555')+'" onclick="SV(\'blocks\')">Blocos</button>';
h+='</div>';

if(st.view==='daily'){h+=RD()}else{h+=RBL()}
a.innerHTML=h;
}catch(err){document.getElementById('app').innerHTML='<p style="color:red;padding:20px">Erro: '+err.message+'</p>'}
}

function RD(){
var day=DAYS[st.day];
var dayD=DAYS_DISPLAY[st.day];
var ss=data[day]||[];
var t=ss.length;
var dc=0;
for(var i=0;i<t;i++){if(st.done[st.day+'-'+i])dc++}
var p=t>0?Math.round(dc/t*100):0;

var h='<div style="display:flex;gap:3px;padding:8px 10px;overflow-x:auto">';
for(var i=0;i<DAYS.length;i++){
h+='<button style="flex:0 0 auto;padding:6px 12px;border-radius:14px;font-size:11px;font-weight:700;font-family:monospace;background:'+(st.day===i?'#e94560':'#0c0c18')+';color:'+(st.day===i?'#fff':'#555')+'" onclick="SD('+i+')">'+DAYS_DISPLAY[i].substring(0,3)+'</button>';
}
h+='</div>';

h+='<div style="margin:2px 10px 6px;background:#09090f;border:1px solid #141425;border-radius:10px;padding:12px">';
h+='<div style="display:flex;justify-content:space-between;align-items:flex-start"><div>';
h+='<div style="font-size:17px;font-family:monospace;font-weight:800;color:#fff">'+dayD+'</div>';
h+='<div style="color:#e94560;font-size:10px;font-family:monospace;font-weight:700;margin-top:3px">'+ANGLES[day]+'</div>';
h+='</div><span style="color:'+(dc===t?'#2a7a2a':'#e94560')+';font-size:12px;font-family:monospace;font-weight:800">'+dc+'/'+t+'</span></div>';
h+='<div style="margin-top:8px;height:3px;background:#0c0c0c;border-radius:2px;overflow:hidden"><div style="height:100%;border-radius:2px;transition:width .3s;width:'+p+'%;background:'+(dc===t?'#2a7a2a':'#e94560')+'"></div></div>';
h+='</div>';

for(var i=0;i<ss.length;i++){
var s=ss[i];
var k=st.day+'-'+i;
var dn=st.done[k]||false;
var bl=BM[s.b]||BM.B3;

h+='<div style="background:'+(dn?'#060d06':'#09090f')+';border:1px solid '+(dn?'#1a3a1a':'#141425')+';border-left:3px solid '+bl.c+';border-radius:10px;margin:0 10px 6px;opacity:'+(dn?'0.45':'1')+'">';
h+='<div style="padding:10px 12px;display:flex;gap:10px;align-items:flex-start">';

h+='<button style="width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:1px;border:2px solid '+(dn?'#2a7a2a':bl.c)+';background:'+(dn?'#2a7a2a':'transparent')+';color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center" onclick="TG('+i+')">'+(dn?'v':'')+'</button>';

h+='<div style="flex:1;min-width:0">';

h+='<div style="display:flex;justify-content:space-between;align-items:center">';
h+='<span style="color:'+bl.c+';font-size:8px;font-weight:800;letter-spacing:1.5px;font-family:monospace">'+bl.e+' '+bl.n+'</span>';
h+='<span style="color:#e94560;font-size:13px;font-family:monospace;font-weight:800">'+esc(s.t)+'</span>';
h+='</div>';

h+='<p style="color:'+(dn?'#333':'#e8e8f0')+';font-size:13px;font-weight:600;line-height:1.3;margin:3px 0 0;text-decoration:'+(dn?'line-through':'none')+'">'+esc(s.d)+'</p>';

h+='<div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px 8px">';
h+='<div><div style="color:#555;font-size:8px;font-weight:700;letter-spacing:1px;font-family:monospace">FORMATO</div><p style="color:'+(dn?'#2a2a2a':'#8888aa')+';font-size:11px;line-height:1.3;margin:1px 0 0">'+esc(s.fo)+'</p></div>';
h+='<div><div style="color:#555;font-size:8px;font-weight:700;letter-spacing:1px;font-family:monospace">CENARIO</div><p style="color:'+(dn?'#2a2a2a':'#8888aa')+';font-size:11px;line-height:1.3;margin:1px 0 0">'+esc(s.ce)+'</p></div>';
h+='<div><div style="color:#555;font-size:8px;font-weight:700;letter-spacing:1px;font-family:monospace">ELEMENTOS</div><p style="color:'+(dn?'#2a2a2a':'#8888aa')+';font-size:11px;line-height:1.3;margin:1px 0 0">'+esc(s.el)+'</p></div>';
h+='<div style="grid-column:1/3"><div style="color:#555;font-size:8px;font-weight:700;letter-spacing:1px;font-family:monospace">FALA / TEXTO</div><p style="color:'+(dn?'#2a2a2a':'#c0c0d8')+';font-size:11px;line-height:1.4;margin:1px 0 0;font-style:italic">'+esc(s.fa)+'</p></div>';
h+='</div>';

h+='<div style="margin-top:8px;display:flex;gap:6px">';
h+='<button style="background:#0c0c18;border:1px solid #1a1a2e;color:#888;border-radius:5px;padding:4px 10px;font-size:9px;font-weight:700;font-family:monospace" onclick="ED('+i+')">Editar</button>';
h+='<button style="background:#1a0a0a;border:1px solid #3a1a1a;color:#e94560;border-radius:5px;padding:4px 10px;font-size:9px;font-weight:700;font-family:monospace" onclick="DEL('+i+')">Remover</button>';
h+='</div>';

h+='</div></div></div>';
}

h+='<button style="display:flex;align-items:center;justify-content:center;width:calc(100% - 20px);margin:8px 10px;padding:12px;background:#0c0c18;border:1px dashed #1a1a2e;border-radius:10px;color:#555;font-size:11px;font-weight:700;font-family:monospace" onclick="ADD()">+ Adicionar story</button>';
h+='<div style="height:60px"></div>';
return h;
}

function RBL(){
var h='<div style="padding:10px;padding-bottom:80px">';
h+='<h2 style="font-size:15px;font-family:monospace;margin-bottom:10px;color:#fff">7 Blocos</h2>';
for(var j=0;j<BLOCKS.length;j++){
var b=BLOCKS[j];
var c=0;
for(var di=0;di<DAYS.length;di++){var arr=data[DAYS[di]]||[];for(var si=0;si<arr.length;si++){if(arr[si].b===b.id)c++}}
h+='<button style="width:100%;display:flex;align-items:center;gap:10px;background:#09090f;border:1px solid '+b.c+'33;border-left:3px solid '+b.c+';border-radius:8px;padding:12px;margin-bottom:5px;text-align:left" onclick="OB(\''+b.id+'\')">';
h+='<span style="font-size:16px;width:24px;text-align:center">'+b.e+'</span>';
h+='<div style="flex:1"><div style="font-size:13px;font-family:monospace;color:#fff;font-weight:700">'+b.n+'</div><div style="color:#666;font-size:9px;font-family:monospace">'+c+' stories/semana</div></div>';
h+='<span style="color:#444;font-size:14px">-></span></button>';
}
h+='</div>';
return h;
}

function showModal(title,fields,onSave){
var old=document.getElementById('modal-bg');if(old)old.remove();
var bg=document.createElement('div');bg.id='modal-bg';
bg.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px';
var m='<div style="background:#0a0a12;border:1px solid #1a1a2e;border-radius:12px;padding:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto">';
m+='<h3 style="font-size:14px;font-family:monospace;margin-bottom:14px;color:#fff">'+title+'</h3>';
for(var i=0;i<fields.length;i++){
var f=fields[i];
m+='<div style="margin:10px 0 3px;color:#888;font-size:9px;font-weight:700;letter-spacing:1px;font-family:monospace">'+f.label+'</div>';
if(f.type==='select'){
m+='<select id="mf-'+f.id+'" style="width:100%;background:#060609;border:1px solid #1a1a2e;color:#ccc;border-radius:5px;padding:8px;font-size:12px;font-family:monospace">';
for(var j=0;j<f.options.length;j++){var o=f.options[j];m+='<option value="'+esc(o.v)+'"'+(o.v===f.val?' selected':'')+'>'+esc(o.l)+'</option>'}
m+='</select>';
}else if(f.type==='textarea'){
m+='<textarea id="mf-'+f.id+'" rows="3" style="width:100%;background:#060609;border:1px solid #1a1a2e;color:#ccc;border-radius:5px;padding:8px;font-size:12px;font-family:monospace;resize:vertical;box-sizing:border-box">'+esc(f.val)+'</textarea>';
}else{
m+='<input type="text" id="mf-'+f.id+'" value="'+esc(f.val)+'" style="width:100%;background:#060609;border:1px solid #1a1a2e;color:#ccc;border-radius:5px;padding:8px;font-size:12px;font-family:monospace;box-sizing:border-box">';
}
}
m+='<div style="display:flex;gap:8px;margin-top:16px">';
m+='<button style="flex:1;padding:10px;border-radius:7px;font-size:11px;font-weight:700;background:#1a1a2e;color:#888;font-family:monospace" onclick="CM()">Cancelar</button>';
m+='<button style="flex:1;padding:10px;border-radius:7px;font-size:11px;font-weight:700;background:#e94560;color:#fff;font-family:monospace" onclick="SM()">Salvar</button>';
m+='</div></div>';
bg.innerHTML=m;
document.body.appendChild(bg);
window._ms=onSave;window._mf=fields;
}

window.CM=function(){var m=document.getElementById('modal-bg');if(m)m.remove()};
window.SM=function(){
var v={};
for(var i=0;i<window._mf.length;i++){
var f=window._mf[i];
var el=document.getElementById('mf-'+f.id);
if(el)v[f.id]=el.value;
}
if(window._ms)window._ms(v);
CM();
};

window.SV=function(v){st.view=v;R()};
window.SD=function(d){st.day=d;R()};
window.TG=function(i){var k=st.day+'-'+i;st.done[k]=!st.done[k];save();R()};

window.ED=function(i){
var day=DAYS[st.day];var s=data[day][i];
var bo=[];for(var j=0;j<BLOCKS.length;j++){bo.push({v:BLOCKS[j].id,l:BLOCKS[j].e+' '+BLOCKS[j].n})}
showModal('Editar Story',[
{id:'t',label:'HORARIO',type:'text',val:s.t},
{id:'b',label:'BLOCO',type:'select',val:s.b,options:bo},
{id:'d',label:'DESCRICAO',type:'text',val:s.d},
{id:'fo',label:'FORMATO',type:'text',val:s.fo},
{id:'ce',label:'CENARIO',type:'text',val:s.ce},
{id:'el',label:'ELEMENTOS',type:'text',val:s.el},
{id:'fa',label:'FALA / TEXTO',type:'textarea',val:s.fa}
],function(v){data[day][i]={t:v.t,b:v.b,d:v.d,fo:v.fo,ce:v.ce,el:v.el,fa:v.fa};save();R()});
};

window.DEL=function(i){
if(!confirm('Remover este story?'))return;
var day=DAYS[st.day];data[day].splice(i,1);
var nd={};var keys=Object.keys(st.done);
for(var j=0;j<keys.length;j++){
var k=keys[j];var p=k.split('-');
if(parseInt(p[0])===st.day){var x=parseInt(p[1]);if(x<i)nd[k]=st.done[k];else if(x>i)nd[p[0]+'-'+(x-1)]=st.done[k]}
else{nd[k]=st.done[k]}
}
st.done=nd;save();R();
};

window.ADD=function(){
var bo=[];for(var j=0;j<BLOCKS.length;j++){bo.push({v:BLOCKS[j].id,l:BLOCKS[j].e+' '+BLOCKS[j].n})}
showModal('Novo Story',[
{id:'t',label:'HORARIO',type:'text',val:''},
{id:'b',label:'BLOCO',type:'select',val:'B3',options:bo},
{id:'d',label:'DESCRICAO',type:'text',val:''},
{id:'fo',label:'FORMATO',type:'text',val:''},
{id:'ce',label:'CENARIO',type:'text',val:''},
{id:'el',label:'ELEMENTOS',type:'text',val:''},
{id:'fa',label:'FALA / TEXTO',type:'textarea',val:''}
],function(v){var day=DAYS[st.day];data[day].push({t:v.t,b:v.b,d:v.d,fo:v.fo,ce:v.ce,el:v.el,fa:v.fa});save();R()});
};

window.OB=function(id){
var b=BM[id];var a=document.getElementById('app');
var h='<div style="padding:14px 10px 4px;display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;background:#e94560;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;font-family:monospace">R</div><div><div style="font-size:14px;font-family:monospace;font-weight:800;color:#fff">Rayhan Stories</div><div style="color:#2a2a2a;font-size:8px;font-family:monospace;letter-spacing:2px">CONTROLE DE STORIES</div></div></div>';
h+='<div style="display:flex;gap:4px;padding:6px 10px;position:sticky;top:0;background:#050508;z-index:50"><button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:#0c0c18;color:#555" onclick="SV(\'daily\')">Dia</button><button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:#e94560;color:#fff" onclick="SV(\'blocks\')">Blocos</button></div>';
h+='<div style="padding:10px;padding-bottom:80px">';
h+='<button style="background:#0c0c18;border:1px solid #1a1a2e;color:#555;border-radius:6px;padding:5px 12px;font-size:10px;font-family:monospace;margin-bottom:10px" onclick="SV(\'blocks\')"><- Voltar</button>';
h+='<div style="background:#09090f;border:1px solid '+b.c+'33;border-left:4px solid '+b.c+';border-radius:10px;padding:14px;margin-bottom:12px"><span style="font-size:16px">'+b.e+'</span><h2 style="color:#fff;font-size:17px;margin:4px 0 0;font-family:monospace">'+b.n+'</h2></div>';
for(var di=0;di<DAYS.length;di++){
var day=DAYS[di];
var items=[];var arr=data[day]||[];
for(var si=0;si<arr.length;si++){if(arr[si].b===id)items.push(arr[si])}
if(items.length===0)continue;
h+='<div style="margin-bottom:12px"><h3 style="color:'+b.c+';font-size:10px;font-family:monospace;font-weight:800;letter-spacing:1.5px;margin-bottom:5px">'+DAYS_DISPLAY[di].toUpperCase()+'</h3>';
for(var si=0;si<items.length;si++){
var s=items[si];
h+='<div style="background:#09090f;border:1px solid #141425;border-radius:7px;padding:8px 10px;margin-bottom:3px">';
h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="color:#ccc;font-size:11px;font-weight:600">'+esc(s.d)+'</span><span style="color:#e94560;font-size:10px;font-family:monospace;font-weight:800">'+esc(s.t)+'</span></div>';
h+='<div style="color:#555;font-size:9px;font-family:monospace">'+esc(s.fo)+' | '+esc(s.ce)+' | '+esc(s.el)+'</div>';
h+='<p style="color:#777;font-size:9px;font-family:monospace;font-style:italic;margin:3px 0 0">'+esc(s.fa)+'</p></div>';
}
h+='</div>';
}
h+='</div>';
a.innerHTML=h;
};

R();

}catch(globalErr){
document.getElementById('app').innerHTML='<div style="color:#e94560;padding:20px;font-family:monospace"><h2>Erro</h2><p style="margin-top:10px">'+globalErr.message+'</p><button style="margin-top:10px;padding:8px 16px;background:#e94560;color:#fff;border:none;border-radius:5px;font-family:monospace" onclick="localStorage.clear();location.reload()">Limpar cache e recarregar</button></div>';
}
</script>
</body>
</html>
